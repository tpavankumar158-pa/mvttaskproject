<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport'
          content='width=device-width, initial-scale=1'>
    <title>Employees</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css">
</head>

<body style="background-color:#f1f5f9;">
    <div class="container">
        <!-- Heading Section -->
        <section class="mt-5">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-5 text-center bg-dark rounded-4">
                    <h1 class="display-5 fw-bold text-warning">
                        <i class="bi bi-cart-fill"></i>
                        Employee Management System
                    </h1>
                    <p class="lead text-light mt-3">
                        Manage Employees 
                    </p>
                </div>
            </div>
        </section>
        <!-- Top Controls -->
        <section class="mt-4">
            <div class="row align-items-center">
                <!-- Add Button -->
                <div class="col-md-4 mb-3">
                    <a href="/add"
                       class="btn btn-primary btn-lg shadow rounded-3">
                        <i class="bi bi-plus-circle-fill"></i>
                        Add Employee
                    </a>
                </div>
                <!-- Search -->
                 <form method="GET" action="{% url 'findemployee' %}">
                            <div class="input-group mt-2">
                                <input type="text" name="id" class="form-control " placeholder="Search by Id">

                                <button class="btn btn-primary" type="submit">
                                    <i class="bi bi-search"></i>
                                </button>
                            </div>
                        </form>
            </div>
        </section>
        <!-- Table Section -->
        <section class="mt-4 mb-5">
            {% if EmpList %}
            <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
                <div class="card-header bg-black text-white p-4">
                    <h3 class="mb-0 fw-bold">
                        <i class="bi bi-table"></i>
                        Employee Records
                    </h3>
                </div>
                <div class="card-body p-0">
                    <table class="table table-hover table-bordered text-center align-middle mb-0">
                        <!-- Table Head -->
                        <thead class="table-dark">
                            <tr>
                                <th class="p-3">Employee ID</th>
                                <th class="p-3">Employee Name</th>
                                <th class="p-3">Employee Salary</th>
                                <th class="p-3">Actions</th>
                            </tr>
                        </thead>
                        <!-- Table Body -->
                        <tbody>
                            {% for emp in EmpList %}
                            <tr>
                                <td class="fw-bold">
                                    {{ emp.EmployeeId }}
                                </td>
                                <td>
                                    {{ emp.EmployeeName }}
                                </td>
                                <td class="text-success fw-bold">
                                    ₹ {{ emp.EmployeeSalary }}
                                </td>
                                <td>
                                    <!-- Edit -->
                                    <a href="/edit/{{emp.EmployeeId}}"
                                       class="btn btn-warning btn-sm rounded-3">

                                        <i class="bi bi-pencil-square text-white fs-5"></i>
                                    </a>
                                    <!-- Find -->
                                    <!-- <a href="/find/{{pro.ProductId}}"
                                       class="btn btn-primary btn-sm rounded-3">

                                        <i class="bi bi-search text-white fs-5"></i>
                                    </a> -->
                                    <!-- Delete -->
                                    <a href="/delete/{{emp.EmployeeId}}"
                                       class="btn btn-danger btn-sm rounded-3">
                                        <i class="bi bi-trash-fill fs-5"></i>
                                    </a>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
            {% else %}
            <!-- No Records -->
            <div class="card shadow border-0 rounded-4 p-5 text-center">
                <h1 class="text-danger fw-bold">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    Records Not Found
                </h1>
            </div>
            {% endif %}
        </section>
    </div>
</body>
</html>
